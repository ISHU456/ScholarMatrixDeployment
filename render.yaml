services:
  # 1. Backend Web Service
  - type: web
    name: scholarmatrixdeploymentserver
    runtime: node
    plan: free # Change to 'starter' for production
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Provide this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a random secret for security
      - key: FRONTEND_URL
        sync: false # Provide your frontend URL (e.g., https://scholarmatrixdeployment-client.onrender.com)
      - key: GROQ_API_KEY
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: CLOUD_API_KEY
        sync: false
      - key: CLOUD_API_SECRET
        sync: false

  # 2. Frontend Static Site
  - type: static
    name: scholarmatrixdeployment-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: scholarmatrixdeploymentserver
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
