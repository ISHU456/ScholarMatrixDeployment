version: '3.8'

services:
  lms-backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: lms-backend
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      # Note: Local .env variables will be picked up by dot-env if mounted,
      # or you can supply an env_file here.
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped

  lms-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: lms-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - lms-backend
    restart: unless-stopped
